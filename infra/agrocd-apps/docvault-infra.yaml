apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docvault-infra-deps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/duyimew/docvault.git'
    targetRevision: testing
    path: infra/k8s/infra-deps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
