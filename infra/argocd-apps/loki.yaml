apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
spec:
  project: default
  source:
    chart: loki-stack
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 2.10.3
    helm:
      values: |
        loki:
          enabled: true
          isDefault: false
          persistence:
            enabled: false
        promtail:
          enabled: true
          config:
            logLevel: info
            serverPort: 3101
        grafana:
          enabled: false
          sidecar:
            datasources:
              enabled: false
        prometheus:
          enabled: false
        fluent-bit:
          enabled: false
        filebeat:
          enabled: false
        logstash:
          enabled: false
        test_pod:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
