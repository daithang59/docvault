# Default values for docvault-service.
# This file will be overwritten for each service (gateway, metadata, etc.)

replicaCount: 1
namespace: default

image:
  repository: daithang59/gateway
  pullPolicy: IfNotPresent
  # Overridden by Jenkins during build
  tag: "latest"
  digest: ""

service:
  type: ClusterIP
  port: 3000

healthPath: /health

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  NODE_ENV: production

envFrom: []
