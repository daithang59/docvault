# notification-service values
namespace: docvault

image:
  repository: daithang59/notification-service
  tag: "v52"
  digest: "sha256:3f9745ed2de11804007e038342c615dc3b98ac7bde0d3e845196fcfa7c8d4937"

healthPath: /health

service:
  type: ClusterIP
  port: 3005
env:
  NODE_ENV: production
  PORT: "3005"
  KEYCLOAK_BASE_URL: "http://keycloak:8080"
  # Patched at runtime by scripts/setup-eks-access.ps1 to the public
  # Keycloak NodePort issuer while JWKS stays on KEYCLOAK_BASE_URL.
  KEYCLOAK_ISSUER: "http://keycloak:8080/realms/docvault"
  KEYCLOAK_REALM: "docvault"
  KEYCLOAK_AUDIENCE: "docvault-gateway"
  AUDIT_SERVICE_URL: "http://docvault-audit-service:3004"

envFrom:
  - secretRef:
      name: docvault-app-secrets
