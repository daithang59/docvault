# document-service values
namespace: default

image:
  repository: daithang59/document-service
  tag: "v23"
  digest: "sha256:fc31bb92ace8a8df1e80d086d404bd5968c6940b0485110a8e6c2dab235279b6"

healthPath: /health

service:
  type: NodePort
  port: 3002
  nodePort: 30002
env:
  NODE_ENV: production
  PORT: "3002"
  KEYCLOAK_BASE_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "docvault"
  KEYCLOAK_AUDIENCE: "docvault-gateway"
  METADATA_SERVICE_URL: "http://docvault-metadata:3001"
  AUDIT_SERVICE_URL: "http://docvault-audit-service:3004"
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "docvault"
  S3_REGION: "us-east-1"
  S3_FORCE_PATH_STYLE: "true"

envFrom:
  - secretRef:
      name: docvault-app-secrets
