openapi: 3.0.3
info:
  title: DocVault API Gateway
  description: |
    Unified API gateway for DocVault — secure document management system.

    ## Authentication

    **Development (localhost):** After signing in via `/auth/login`, the gateway sets an
    `dv_access_token` cookie. Subsequent API calls automatically include this cookie.

    **Production:** Pass the Keycloak JWT in the `Authorization` header:
    `Authorization: Bearer <token>`

    Both methods are accepted on all protected endpoints.

    ## Roles
    | Role | Permissions |
    |------|-------------|
    | `viewer` | Read published documents, download files |
    | `editor` | Create, upload, submit, archive documents |
    | `approver` | Approve/reject pending documents |
    | `compliance_officer` | Read audit logs and metadata (cannot download files) |
    | `admin` | Full access |

    ## Document Lifecycle
    ```
    DRAFT → PENDING → PUBLISHED → ARCHIVED
    ```

    ## Compliance Officer Restriction
    Compliance officers (`compliance_officer`) are **never allowed** to download files,
    regardless of ACL configuration — enforced by policy.service.ts.
  version: 0.1.0
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.docvault.internal
    description: Production

security:
  - bearerAuth: []
  - cookieAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak-issued RS256 JWT token passed as `Authorization: Bearer <token>`
    cookieAuth:
      type: apiKey
      in: cookie
      name: dv_access_token
      description: JWT issued by the gateway after Keycloak OIDC login — set automatically by the frontend

  schemas:
    # ─── Common ───────────────────────────────────────────────────────────────
    Error:
      type: object
      properties:
        statusCode: { type: integer }
        message: { type: string }
        error: { type: string }

    # ─── Classification ───────────────────────────────────────────────────────
    ClassificationLevel:
      type: string
      enum: [PUBLIC, INTERNAL, CONFIDENTIAL, SECRET]
      description: |
        Document security classification level.
        - PUBLIC: Anyone authenticated can view and download
        - INTERNAL: viewer+ role, must be PUBLISHED
        - CONFIDENTIAL: editor+ role, PUBLISHED, owner or explicit ACL required
        - SECRET: approver+ role, PUBLISHED, owner or explicit ACL required
        CONFIDENTIAL and SECRET documents are watermarked on download.

    # ─── Documents ─────────────────────────────────────────────────────────────
    DocumentStatus:
      type: string
      enum: [DRAFT, PENDING, PUBLISHED, ARCHIVED]

    Document:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        classification: { $ref: '#/components/schemas/ClassificationLevel' }
        status: { $ref: '#/components/schemas/DocumentStatus' }
        currentVersion: { type: integer, nullable: true }
        ownerId: { type: string }
        tags: { type: array, items: { type: string } }
        publishedAt: { type: string, format: date-time, nullable: true, description: Set when document is published. Used for retention. }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateDocument:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string, maxLength: 1000 }
        classification: { type: string, default: INTERNAL }
        tags: { type: array, items: { type: string } }

    UpdateDocument:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string, maxLength: 1000 }
        classification: { type: string }
        tags: { type: array, items: { type: string } }

    # ─── Versions ──────────────────────────────────────────────────────────────
    DocumentVersion:
      type: object
      properties:
        id: { type: string }
        docId: { type: string }
        version: { type: integer }
        objectKey: { type: string }
        checksum: { type: string, description: SHA-256 hex }
        size: { type: integer }
        filename: { type: string }
        contentType: { type: string }
        createdAt: { type: string, format: date-time }

    CreateVersion:
      type: object
      required: [version, objectKey, checksum, filename]
      properties:
        version: { type: integer }
        objectKey: { type: string }
        checksum: { type: string }
        size: { type: integer }
        filename: { type: string }
        contentType: { type: string }

    # ─── ACL ──────────────────────────────────────────────────────────────────
    AclSubjectType:
      type: string
      enum: [USER, ROLE, ALL]

    AclPermission:
      type: string
      enum: [DOWNLOAD]

    AclEffect:
      type: string
      enum: [ALLOW, DENY]

    AclEntry:
      type: object
      properties:
        id: { type: string }
        docId: { type: string }
        subjectType: { $ref: '#/components/schemas/AclSubjectType' }
        subjectId: { type: string, nullable: true, description: User ID or role name. null for ALL }
        permission: { $ref: '#/components/schemas/AclPermission' }
        effect: { $ref: '#/components/schemas/AclEffect' }

    UpsertAcl:
      type: object
      required: [subjectType, permission, effect]
      properties:
        subjectType: { $ref: '#/components/schemas/AclSubjectType' }
        subjectId: { type: string, nullable: true }
        permission: { $ref: '#/components/schemas/AclPermission' }
        effect: { $ref: '#/components/schemas/AclEffect' }

    # ─── Workflow ─────────────────────────────────────────────────────────────
    WorkflowHistory:
      type: object
      properties:
        id: { type: string }
        docId: { type: string }
        fromStatus: { $ref: '#/components/schemas/DocumentStatus' }
        toStatus: { $ref: '#/components/schemas/DocumentStatus' }
        action: { type: string }
        reason: { type: string, nullable: true }
        actorId: { type: string }
        createdAt: { type: string, format: date-time }

    UpdateStatus:
      type: object
      required: [status, action]
      properties:
        status: { $ref: '#/components/schemas/DocumentStatus' }
        action: { type: string }
        reason: { type: string }

    RejectWorkflow:
      type: object
      properties:
        reason: { type: string, maxLength: 500 }

    # ─── Download ─────────────────────────────────────────────────────────────
    DownloadAuthorize:
      type: object
      properties:
        version: { type: integer, description: Specific version to authorize }
        grantToken: { type: string, description: HMAC-signed grant token }
        docId: { type: string }
        version: { type: integer }
        filename: { type: string }
        contentType: { type: string }
        expiresInSeconds: { type: integer }
        expiresAt: { type: string, format: date-time }
        classification: { $ref: '#/components/schemas/ClassificationLevel' }
        watermarkRequired: { type: boolean, description: If true, document must be streamed (watermark applied). Presigned URL is not available. }

    PresignedDownloadUrl:
      type: object
      properties:
        docId: { type: string }
        version: { type: integer }
        filename: { type: string }
        expiresInSeconds: { type: integer }
        expiresAt: { type: string, format: date-time }
        url: { type: string, format: uri, nullable: true, description: MinIO presigned download URL. Null when watermarkRequired is true (use streaming endpoint instead). }
        watermarkRequired: { type: boolean, default: false }
        streamingEndpoint: { type: string, nullable: true, description: Path to the streaming endpoint for watermarked downloads. Present when url is null. }

    PreviewAuthorize:
      type: object
      properties:
        version: { type: integer, description: Specific version to authorize }
        grantToken: { type: string, description: HMAC-signed preview grant token }
        docId: { type: string }
        version: { type: integer }
        filename: { type: string }
        contentType: { type: string }
        expiresInSeconds: { type: integer }
        expiresAt: { type: string, format: date-time }
        classification: { $ref: '#/components/schemas/ClassificationLevel' }

    # ─── Audit ────────────────────────────────────────────────────────────────
    AuditEventResult:
      type: string
      enum: [SUCCESS, DENY, CONFLICT, ERROR]

    AuditEvent:
      type: object
      properties:
        eventId: { type: string }
        timestamp: { type: string, format: date-time }
        actorId: { type: string }
        actorRoles: { type: array, items: { type: string } }
        action:
          type: string
          description: |
            Canonical audit action constants:
            COMMENT_ADDED, COMMENT_UPDATED, COMMENT_DELETED,
            COMMENT_UPDATE_DENIED, COMMENT_DELETE_DENIED,
            DOCUMENT_CREATED, DOCUMENT_METADATA_UPDATED,
            DOCUMENT_ACL_UPDATED, DOCUMENT_ACL_DELETED,
            DOCUMENT_SUBMIT, DOCUMENT_APPROVE, DOCUMENT_REJECT, DOCUMENT_ARCHIVE,
            AUDIT_EVENT_CREATED, AUDIT_CHAIN_VERIFIED,
            REQUEST_RECEIVED, REQUEST_OK, REQUEST_DENIED
        resourceType: { type: string }
        resourceId: { type: string, nullable: true }
        result: { $ref: '#/components/schemas/AuditEventResult' }
        reason: { type: string, nullable: true }
        ip: { type: string, nullable: true }
        traceId: { type: string, nullable: true }
        metadata: { type: object, nullable: true, description: 'Structured payload describing the event details (e.g. old/new values, comment content, change diff)' }
        prevHash: { type: string, nullable: true }
        hash: { type: string }

    QueryAudit:
      type: object
      properties:
        actorId: { type: string }
        action: { type: string }
        resourceType: { type: string }
        resourceId: { type: string }
        result: { $ref: '#/components/schemas/AuditEventResult' }
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        limit: { type: integer, default: 100, maximum: 200 }

    VerifyChainResult:
      type: object
      properties:
        valid: { type: boolean }
        checked: { type: integer }
        firstBrokenIndex: { type: integer, nullable: true }
        message: { type: string, nullable: true }

    # ─── Notification ─────────────────────────────────────────────────────────
    NotificationRecord:
      type: object
      required: [id, type, docId, recipientId, createdAt, read]
      properties:
        id:          { type: string, description: 'Unique notification ID' }
        type:        { type: string, enum: [SUBMITTED, APPROVED, REJECTED, ARCHIVED, DELETED] }
        docId:       { type: string }
        recipientId: { type: string, description: 'User ID this notification is addressed to' }
        docTitle:    { type: string, nullable: true, description: 'Human-readable document title for UI display' }
        reason:      { type: string, nullable: true }
        traceId:     { type: string, nullable: true }
        createdAt:   { type: string, format: date-time }
        read:        { type: boolean }

    Notification:
      type: object
      required: [type, docId]
      properties:
        type:
          type: string
          enum: [SUBMITTED, APPROVED, REJECTED, ARCHIVED, DELETED]
        docId:       { type: string }
        recipientId:
          type: string
          nullable: true
          description: 'Single recipient (mutually exclusive with recipientIds)'
        recipientIds:
          type: array
          items: { type: string }
          nullable: true
          description: 'Multiple recipients for SUBMITTED type'
        docTitle:    { type: string, nullable: true }
        reason:      { type: string, nullable: true }

    NotificationPage:
      type: object
      properties:
        records: { type: array, items: { $ref: '#/components/schemas/NotificationRecord' } }
        total:   { type: integer }
        page:    { type: integer }
        pages:   { type: integer }

    UnreadCount:
      type: object
      properties:
        count: { type: integer }

    # ─── Auth ─────────────────────────────────────────────────────────────────
    CurrentUser:
      type: object
      properties:
        sub: { type: string }
        username: { type: string }
        email: { type: string, nullable: true }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        displayName: { type: string, nullable: true }
        roles: { type: array, items: { type: string } }
        raw: { type: object, description: 'Full JWT payload from Keycloak' }

    UserProfile:
      type: object
      description: Full user profile fetched from Keycloak UserInfo endpoint
      properties:
        sub: { type: string }
        username: { type: string }
        displayName: { type: string, nullable: true }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        email: { type: string, nullable: true }
        roles: { type: array, items: { type: string } }

# ─── Paths ───────────────────────────────────────────────────────────────────
paths:

  # ─── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    get:
      summary: Initiate Keycloak OIDC login
      operationId: authLogin
      description: |
        Redirects the browser to the Keycloak login page. After successful authentication,
        Keycloak redirects back to `/auth/callback` with an authorization code.
      security: []
      responses:
        '302':
          description: Redirect to Keycloak login page

  /auth/callback:
    get:
      summary: Keycloak OIDC callback
      operationId: authCallback
      description: |
        Receives the authorization code from Keycloak, exchanges it for tokens,
        and sets session cookies (`dv_access_token`, `dv_refresh_token`, `dv_user`)
        on the gateway origin.
      security: []
      parameters:
        - in: query
          name: code
          schema:
            type: string
          description: Authorization code from Keycloak
        - in: query
          name: state
          schema:
            type: string
          description: CSRF state parameter
        - in: query
          name: error
          schema:
            type: string
          description: Error from Keycloak (e.g., access_denied)
      responses:
        '302':
          description: Redirect to frontend with `?auth=ok` on success, or `?error=<reason>` on failure

  /auth/logout:
    post:
      summary: Logout — clear session and redirect to Keycloak
      operationId: authLogout
      description: Clears session cookies and redirects to Keycloak to invalidate the SSO session.
      security: []
      responses:
        '302':
          description: Redirect to Keycloak logout then back to frontend login page

  # ─── Health ────────────────────────────────────────────────────────────────
  /health:
    get:
      summary: Healthcheck
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  service: { type: string }

  /me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Metadata — Documents ──────────────────────────────────────────────────
  /metadata/documents:
    get:
      summary: List documents (ACL-filtered)
      operationId: listDocuments
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Documents]
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DocumentStatus'
          description: Filter by status (applied by gateway before proxy)

    post:
      summary: Create a document metadata record
      operationId: createDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Documents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocument'
      responses:
        '201':
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — editor or admin required

  /metadata/documents/{docId}:
    get:
      summary: Get a document by ID
      operationId: getDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/docId'
      responses:
        '200':
          description: Document detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '401':
          description: Unauthorized
        '404':
          description: Document not found

    patch:
      summary: Update document metadata
      operationId: updateDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocument'
      responses:
        '200':
          description: Updated document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '403':
          description: Forbidden — owner editor or admin
        '404':
          description: Not found

  /metadata/documents/{docId}/versions:
    post:
      summary: Register a new document version
      operationId: createVersion
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVersion'
      responses:
        '201':
          description: Version registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersion'
        '403':
          description: Forbidden — editor or admin
        '404':
          description: Document not found

  /metadata/documents/{docId}/status:
    post:
      summary: Update document status (workflow transition)
      operationId: updateStatus
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatus'
      responses:
        '200':
          description: Status updated
        '403':
          description: Forbidden
        '409':
          description: Conflict — invalid state transition

  /metadata/documents/{docId}/acl:
    get:
      summary: List ACL rules for a document
      operationId: listAcl
      security:
        - bearerAuth: []
      tags: [ACL]
      parameters:
        - $ref: '#/components/parameters/docId'
      responses:
        '200':
          description: List of ACL entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AclEntry'
        '403':
          description: Forbidden

    post:
      summary: Add an ACL rule to a document
      operationId: upsertAcl
      security:
        - bearerAuth: []
      tags: [ACL]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertAcl'
      responses:
        '201':
          description: ACL entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AclEntry'
        '403':
          description: Forbidden — owner editor or admin

  /metadata/documents/{docId}/download-authorize:
    post:
      summary: Authorize a document download (issues HMAC grant token)
      operationId: authorizeDownload
      security:
        - bearerAuth: []
      tags: [Downloads]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: integer }
      responses:
        '200':
          description: Authorization granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadAuthorize'
        '403':
          description: |
            Forbidden. May be caused by:
            - compliance_officer attempting download (always denied)
            - Document not in PUBLISHED status
            - ACL denies access
        '404':
          description: Document or version not found

  /metadata/documents/{docId}/preview-authorize:
    post:
      summary: Authorize a document preview (issues HMAC preview grant token)
      description: |
        Authorization for inline preview. Unlike download-authorize, this endpoint:
        - Allows compliance_officer role
        - Requires only READ permission (not DOWNLOAD)
        - Does not apply watermarks
      operationId: authorizePreview
      security:
        - bearerAuth: []
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: integer }
      responses:
        '200':
          description: Authorization granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewAuthorize'
        '403':
          description: |
            Forbidden. May be caused by:
            - Document not in PUBLISHED status
            - ACL denies READ access
            - Classification level insufficient
        '404':
          description: Document or version not found

  /metadata/documents/{docId}/workflow-history:
    get:
      summary: Get workflow history for a document
      operationId: getWorkflowHistory
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/docId'
      responses:
        '200':
          description: List of workflow transitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkflowHistory'

  # ─── Documents — Blob Storage ───────────────────────────────────────────────
  /documents/{docId}/upload:
    post:
      summary: Upload a document blob and register a version
      operationId: uploadDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Binary file, max 20 MB
      responses:
        '201':
          description: Upload successful, version registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersion'
        '400':
          description: Bad request — file required or exceeds size limit
        '403':
          description: Forbidden — owner editor or admin

  /documents/{docId}/presign-download:
    post:
      summary: Request a presigned download URL
      operationId: presignDownload
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Downloads]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: integer }
      responses:
        '200':
          description: Presigned URL issued (valid for 5 minutes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedDownloadUrl'
        '403':
          description: Forbidden

  /documents/{docId}/versions/{version}/stream:
    get:
      summary: Stream a document version directly
      description: |
        Returns the document binary as a streaming response.

        **Watermarking:** For documents classified as CONFIDENTIAL or SECRET,
        a watermark containing user identity, timestamp, and classification level
        is prepended to the file bytes before streaming.
      operationId: streamVersion
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Downloads]
      parameters:
        - $ref: '#/components/parameters/docId'
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Binary file stream (watermarked for CONFIDENTIAL/SECRET)
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '403':
          description: Forbidden
        '404':
          description: Document or version not found

  /documents/{docId}/preview:
    get:
      summary: Stream a document for inline preview (supports HTTP Range requests)
      description: |
        Streams the raw document binary for inline display in a browser.
        No watermark is applied. Supports HTTP Range requests for PDF.js lazy loading.
      operationId: previewDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/docId'
        - name: version
          in: query
          required: false
          schema:
            type: integer
          description: Specific version to preview (defaults to current version)
      responses:
        '200':
          description: Binary file stream (inline, no watermark)
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '206':
          description: Partial content (Range request)
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '403':
          description: Forbidden
        '404':
          description: Document or version not found

  # ─── Workflow ──────────────────────────────────────────────────────────────
  /workflow/{docId}/submit:
    post:
      summary: Submit a document (DRAFT → PENDING)
      operationId: submitDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/docId'
      responses:
        '200':
          description: Submitted successfully
        '403':
          description: Forbidden — owner editor or admin
        '409':
          description: Conflict — only DRAFT documents can be submitted

  /workflow/{docId}/approve:
    post:
      summary: Approve a document (PENDING → PUBLISHED)
      operationId: approveDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/docId'
      responses:
        '200':
          description: Approved
        '403':
          description: Forbidden — approver or admin
        '409':
          description: Conflict — only PENDING documents can be approved

  /workflow/{docId}/reject:
    post:
      summary: Reject a document (PENDING → DRAFT)
      operationId: rejectDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectWorkflow'
      responses:
        '200':
          description: Rejected
        '403':
          description: Forbidden — approver or admin
        '409':
          description: Conflict — only PENDING documents can be rejected

  /workflow/{docId}/archive:
    post:
      summary: Archive a document (PUBLISHED → ARCHIVED)
      operationId: archiveDocument
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Workflow]
      parameters:
        - $ref: '#/components/parameters/docId'
      responses:
        '200':
          description: Archived
        '403':
          description: Forbidden — owner editor or admin
        '409':
          description: Conflict — only PUBLISHED documents can be archived

  # ─── Audit ─────────────────────────────────────────────────────────────────
  /audit/events:
    post:
      summary: Emit an audit event (internal — called by services)
      operationId: createAuditEvent
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorId, actorRoles, action, resourceType, result]
              properties:
                eventId: { type: string }
                timestamp: { type: string, format: date-time }
                actorId: { type: string }
                actorRoles: { type: array, items: { type: string } }
                action: { type: string }
                resourceType: { type: string }
                resourceId: { type: string }
                result: { $ref: '#/components/schemas/AuditEventResult' }
                reason: { type: string }
                ip: { type: string }
                traceId: { type: string }
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEvent'
        '401':
          description: Unauthorized

  /users/profile:
    get:
      summary: Get current user profile
      operationId: getUserProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile from Keycloak UserInfo endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized

  /audit/query:
    get:
      summary: Query audit events (compliance officer only)
      operationId: queryAudit
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Audit]
      parameters:
        - in: query
          name: actorId
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: resourceType
          schema: { type: string }
        - in: query
          name: resourceId
          schema: { type: string }
        - in: query
          name: result
          schema: { $ref: '#/components/schemas/AuditEventResult' }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 200 }
      responses:
        '200':
          description: Audit events (sorted by timestamp descending)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEvent'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — compliance_officer role required

  /audit/verify-chain:
    get:
      summary: Verify integrity of the audit hash chain
      operationId: verifyChain
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Audit]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 1000
            maximum: 5000
          description: Maximum number of events to check
      responses:
        '200':
          description: Chain verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyChainResult'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — compliance_officer or admin required

  # ─── Notifications ─────────────────────────────────────────────────────────
  /notify:
    get:
      summary: List paginated notifications for the current user
      operationId: listNotifications
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Notifications]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
          description: 1-based page index
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
          description: Page size
      responses:
        '200':
          description: Paginated notification list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'
        '401':
          description: Unauthorized
    post:
      summary: Send a notification (internal — called by workflow-service)
      operationId: sendNotification
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Notification'
      responses:
        '200':
          description: Notification accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:   { type: boolean }
                  type:       { type: string }
                  docId:      { type: string }
                  recipients: { type: array, items: { type: string } }
        '401':
          description: Unauthorized

  /notify/mark-read:
    post:
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Notifications]
      responses:
        '200':
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '401':
          description: Unauthorized

  /notify/unread-count:
    get:
      summary: Get unread notification count (lightweight — used for polling)
      operationId: getUnreadNotificationCount
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Notifications]
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCount'
        '401':
          description: Unauthorized

  /notify/{id}/read:
    post:
      summary: Mark a single notification as read
      operationId: markNotificationRead
      security:
        - bearerAuth: []
        - cookieAuth: []
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Notification ID
      responses:
        '200':
          description: Done
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '401':
          description: Unauthorized

# ─── Reusable Parameters ─────────────────────────────────────────────────────
parameters:
  docId:
    name: docId
    in: path
    required: true
    schema:
      type: string
    description: Document ID (UUID)
