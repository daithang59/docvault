name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Frontend checks (Next.js)
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run type-check

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Gateway (Node/TS — adjust as needed)
  # ─────────────────────────────────────────────
  gateway:
    name: Gateway — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # ─────────────────────────────────────────────
  # Python services (Ruff + pytest)
  # Template — replicate per Python service
  # ─────────────────────────────────────────────
  python-services:
    name: Python Services — Ruff & Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - metadata-service
          - document-service
          - workflow-service
          - audit-service
          - notification-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint (Ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest --tb=short -q || echo "No tests yet — skipping"

  # ─────────────────────────────────────────────
  # Docker build smoke test
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker — Compose Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose build (no start)
        run: docker compose -f infra/docker-compose.dev.yml build --parallel
        continue-on-error: true  # Remove when compose file is filled in

  # ─────────────────────────────────────────────
  # Consolidated CI gate (for branch protection)
  # ─────────────────────────────────────────────
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs:
      - frontend
      - gateway
      - python-services
      - docker-build
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
